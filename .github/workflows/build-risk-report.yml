name: Build Risk Report

on:
  workflow_run:
    workflows: ["Collect Chrome Releases", "Sync Chromium CVEs", "Sync CISA KEV", "Fetch Version History"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: data-push
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Enrich Gerrit links (batch 200)
        run: python .github/scripts/enrich_gerrit.py 200

      - name: Enrich NVD exploit references
        run: python .github/scripts/enrich_nvd_exploits.py
        continue-on-error: true

      - name: Build risk report
        run: python .github/scripts/build_risk_report.py

      - name: Match assets against CVEs
        run: python .github/scripts/match_assets.py
        continue-on-error: true

      - name: Build site
        run: |
          mkdir -p docs
          cp data/risk-report.json docs/
          # Copy asset risk report if it exists
          if [ -f data/asset-risk-report.json ]; then
            cp data/asset-risk-report.json docs/
          fi
          # index.html is committed to repo (no longer generated inline)

      - name: Commit site and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ data/risk-report.json data/asset-risk-report.json data/gerrit-cache.json data/nvd-exploit-cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update risk report and site $(date -u +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
