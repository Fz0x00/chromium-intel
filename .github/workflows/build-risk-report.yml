name: Build Risk Report

on:
  workflow_run:
    workflows: ["Collect Chrome Releases", "Sync Chromium CVEs", "Sync CISA KEV", "Fetch Version History"]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Build risk report
        run: python .github/scripts/build_risk_report.py
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/risk-report.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update risk report $(date -u +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          fi
