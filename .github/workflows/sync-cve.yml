name: Sync Chromium CVEs

on:
  schedule:
    - cron: '*/30 * * * *'  # 每 30 分钟
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/scripts/extract_chromium_cves.py']

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
      
      - name: Checkout cvelistV5
        run: |
          if [ -d "data/cvelistV5" ]; then
            cd data/cvelistV5 && git pull
          else
            git clone --depth=1 https://github.com/CVEProject/cvelistV5.git data/cvelistV5
          fi
        env:
          GIT_DEPTH: 1
      
      - name: Extract Chromium CVEs
        run: python .github/scripts/extract_chromium_cves.py
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/chromium-cves.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Chromium CVEs $(date -u +'%Y-%m-%d')"
            git push
          fi
