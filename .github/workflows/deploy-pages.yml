name: Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["Build Risk Report"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Build site
        run: |
          mkdir -p docs
          cp data/risk-report.json docs/
          cp data/releases.json docs/
          cp data/chromium-cves.json docs/
          cp data/kev.json docs/
          cp data/version-history.json docs/
          
          cat > docs/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Chromium Intel</title>
            <style>
              body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
              h1 { color: #1a73e8; }
              .card { border: 1px solid #ddd; border-radius: 8px; padding: 16px; margin: 16px 0; }
              .critical { border-left: 4px solid #d93025; }
              .high { border-left: 4px solid #f9ab00; }
              .medium { border-left: 4px solid #1a73e8; }
              .low { border-left: 4px solid #34a853; }
              table { border-collapse: collapse; width: 100%; }
              th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
              th { background: #f5f5f5; }
            </style>
          </head>
          <body>
            <h1>Chromium Intel Dashboard</h1>
            <p>Generated: <span id="generated-at"></span></p>
            
            <div id="summary"></div>
            <h2>Top CVEs</h2>
            <div id="top-cves"></div>
            
            <script>
            fetch('risk-report.json')
              .then(r => r.json())
              .then(data => {
                document.getElementById('generated-at').textContent = data.generated_at;
                
                const s = data.summary;
                document.getElementById('summary').innerHTML = `
                  <div class="card">
                    <h3>Summary</h3>
                    <p>Total CVEs: ${s.total_cves}</p>
                    <p>In KEV (Confirmed Exploitation): ${s.in_kev}</p>
                    <p>In the Wild: ${s.in_the_wild}</p>
                    <p>Critical: ${s.critical} | High: ${s.high} | Medium: ${s.medium} | Low: ${s.low}</p>
                  </div>
                `;
                
                const topCves = data.cves.slice(0, 10);
                let html = '<table><tr><th>CVE</th><th>Score</th><th>KEV</th><th>In Wild</th><th>Description</th></tr>';
                for (const cve of topCves) {
                  const level = cve.risk_score >= 70 ? 'critical' : cve.risk_score >= 50 ? 'high' : cve.risk_score >= 30 ? 'medium' : 'low';
                  html += `<tr class="${level}">
                    <td>${cve.cve_id}</td>
                    <td>${cve.risk_score}</td>
                    <td>${cve.in_kev ? '✓' : '✗'}</td>
                    <td>${cve.in_the_wild ? '✓' : '✗'}</td>
                    <td>${(cve.description || '').substring(0, 80)}...</td>
                  </tr>`;
                }
                html += '</table>';
                document.getElementById('top-cves').innerHTML = html;
              });
            </script>
          </body>
          </html>
          EOF
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    environment:
      github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
