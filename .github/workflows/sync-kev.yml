name: Sync CISA KEV

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 00:00
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/scripts/extract_chromium_kev.py']

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Checkout kev-data
        run: |
          if [ -d "data/kev-data" ]; then
            cd data/kev-data && git pull
          else
            git clone --depth=1 https://github.com/cisagov/kev-data.git data/kev-data
          fi
        env:
          GIT_DEPTH: 1
      
      - name: Extract Chromium KEVs
        run: python .github/scripts/extract_chromium_kev.py
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/kev.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update CISA KEV $(date -u +'%Y-%m-%d')"
            git push
          fi
